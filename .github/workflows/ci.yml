name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --group dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --group dev
      - run: uv run pyright

  test-core:
    # Proves the kernel promise: tests pass with NOTHING beyond core+test deps,
    # and `import woracle` never drags a model library in.
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install ${{ matrix.python-version }}
      - run: uv sync --group test --python ${{ matrix.python-version }}
      - name: torch-leak assertion (kernel rule)
        run: |
          uv run python -c "import sys, woracle; banned=[m for m in ('torch','cv2','transformers') if m in sys.modules]; assert not banned, banned; print('kernel clean:', woracle.__version__)"
      - run: uv run pytest
